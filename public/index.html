<!doctype html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Palestra digitale - Accesso</title>

    <!-- Bootstrap CSS (solo lo stile, niente JavaScript di Bootstrap) -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <!-- Stile personalizzato -->
    <link rel="stylesheet" href="css/stile.css">
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <h1 class="text-center mb-4">Palestra digitale</h1>

            <!-- Bottoni per scegliere se accedere o registrarsi.
                 Cliccandoli si chiama mostraForm() definito in auth.js. -->
            <div class="btn-group w-100 mb-4" role="group">
                <button id="btnTabAccedi" type="button"
                        class="btn btn-primary"
                        onclick="mostraForm('accedi')">Accedi</button>
                <button id="btnTabRegistrati" type="button"
                        class="btn btn-outline-primary"
                        onclick="mostraForm('registrati')">Registrati</button>
            </div>

            <!-- Riquadro per messaggi di errore o successo.
                 Resta nascosto finche' non c'e' niente da mostrare. -->
            <div id="messaggio" class="alert d-none" role="alert"></div>

            <!-- Form di accesso -->
            <form id="formAccedi" class="card p-4">
                <h2 class="h5 mb-3">Accedi al tuo account</h2>

                <div class="mb-3">
                    <label for="accediUsername" class="form-label">Nome utente</label>
                    <input type="text" id="accediUsername" name="username"
                           class="form-control" required>
                </div>

                <div class="mb-3">
                    <label for="accediPassword" class="form-label">Password</label>
                    <input type="password" id="accediPassword" name="password"
                           class="form-control" required>
                </div>

                <button type="submit" class="btn btn-primary w-100">Accedi</button>
            </form>

            <!-- Form di registrazione (nascosto all'avvio) -->
            <form id="formRegistrati" class="card p-4 d-none">
                <h2 class="h5 mb-3">Crea un nuovo account</h2>

                <div class="mb-3">
                    <label for="regTipo" class="form-label">Tipo di account</label>
                    <select id="regTipo" name="tipo" class="form-select" required>
                        <option value="cliente">Cliente</option>
                        <option value="professionista">Professionista (trainer / nutrizionista)</option>
                    </select>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="regNome" class="form-label">Nome</label>
                        <input type="text" id="regNome" name="nome"
                               class="form-control" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="regCognome" class="form-label">Cognome</label>
                        <input type="text" id="regCognome" name="cognome"
                               class="form-control" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="regEmail" class="form-label">Email</label>
                    <input type="email" id="regEmail" name="email"
                           class="form-control" required>
                </div>

                <div class="mb-3">
                    <label for="regUsername" class="form-label">Nome utente</label>
                    <input type="text" id="regUsername" name="username"
                           class="form-control" minlength="3" maxlength="20" required>
                    <div class="form-text">Tra 3 e 20 caratteri, solo lettere, numeri e "_".</div>
                </div>

                <div class="mb-3">
                    <label for="regPassword" class="form-label">Password</label>
                    <input type="password" id="regPassword" name="password"
                           class="form-control" minlength="6" maxlength="50" required>
                    <div class="form-text">Almeno 6 caratteri.</div>
                </div>

                <!-- Campi specifici per cliente (visibili solo quando tipo = cliente) -->
                <div id="campiCliente">
                    <hr>
                    <p class="text-muted small mb-2">Dati per personalizzare i tuoi suggerimenti:</p>
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label for="regEta" class="form-label">Età</label>
                            <input type="number" id="regEta" class="form-control" min="14" max="100" value="30">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="regPeso" class="form-label">Peso (kg)</label>
                            <input type="number" id="regPeso" class="form-control" min="30" max="250" step="0.1" value="70">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="regAltezza" class="form-label">Altezza (cm)</label>
                            <input type="number" id="regAltezza" class="form-control" min="120" max="230" value="170">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="regObiettivo" class="form-label">Obiettivo</label>
                        <select id="regObiettivo" class="form-select">
                            <option value="perdita_peso">Perdita peso</option>
                            <option value="massa">Aumento massa</option>
                            <option value="mantenimento" selected>Mantenimento</option>
                        </select>
                    </div>
                </div>

                <!-- Campo specifico per professionista (visibile solo quando tipo = professionista) -->
                <div id="campiProfessionista" class="d-none">
                    <hr>
                    <div class="mb-3">
                        <label for="regSpecializzazione" class="form-label">Specializzazione</label>
                        <select id="regSpecializzazione" class="form-select">
                            <option value="trainer" selected>Trainer (allenamento)</option>
                            <option value="nutrizionista">Nutrizionista (alimentazione)</option>
                            <option value="entrambi">Entrambi</option>
                        </select>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-100">Registrati</button>
            </form>

        </div>
    </div>
</div>

<!-- Script: prima api.js (utility), poi auth.js (logica della pagina) -->
<script src="js/api.js"></script>
<script src="js/auth.js"></script>

</body>
</html>

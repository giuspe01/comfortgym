<!doctype html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Palestra digitale - Catalogo programmi</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/stile.css">
    <style>
        .card-img-programma {
            height: 180px;
            object-fit: cover;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .card-img-placeholder {
            height: 180px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 2.5rem;
        }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand bg-white border-bottom px-4">
    <span class="navbar-brand">Palestra digitale</span>
    <div class="ms-auto d-flex align-items-center gap-3">
        <a href="cliente.html" class="btn btn-sm btn-outline-secondary">← Dashboard</a>
        <a href="catalogo-piani.html" class="btn btn-sm btn-outline-primary">Catalogo piani</a>
        <button id="btnLogout" type="button" class="btn btn-outline-secondary btn-sm">Esci</button>
    </div>
</nav>

<div class="container py-4">

    <h1 class="h3 mb-4">Catalogo programmi di allenamento</h1>

    <!-- Filtri -->
    <div class="card mb-4">
        <div class="card-body">
            <div class="row g-3 align-items-end">
                <div class="col-md-4">
                    <label class="form-label small text-muted mb-1">Difficolta'</label>
                    <select id="filtroDifficolta" class="form-select form-select-sm">
                        <option value="">Tutte</option>
                        <option value="principiante">Principiante</option>
                        <option value="intermedio">Intermedio</option>
                        <option value="avanzato">Avanzato</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label small text-muted mb-1">Durata max (settimane)</label>
                    <input type="number" id="filtroDurataMax" class="form-control form-control-sm" min="1">
                </div>
                <div class="col-md-4">
                    <button id="btnApplicaFiltri" type="button" class="btn btn-secondary btn-sm w-100">
                        Filtra
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Griglia card -->
    <div id="griglia" class="row row-cols-1 row-cols-md-3 g-4">
        <div class="col"><p class="text-muted">Caricamento...</p></div>
    </div>

</div>

<!-- Modale dettaglio programma -->
<div class="modal fade" id="modalDettaglio" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitolo"></h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="modalCorpo"></div>
            <div class="modal-footer">
                <button type="button" id="btnSelezionaModal" class="btn btn-primary">Seleziona questo programma</button>
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Chiudi</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/catalogo-programmi.js"></script>

</body>
</html>

<!doctype html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Palestra digitale - Area professionista</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/stile.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand bg-white border-bottom px-4">
    <span class="navbar-brand">Palestra digitale</span>
    <span class="ms-auto me-3 text-muted">
        Ciao <span id="nomeUtente"></span>
        <span class="badge bg-secondary ms-2" id="specializzazione"></span>
    </span>
    <button id="btnLogout" type="button" class="btn btn-outline-secondary btn-sm">
        Esci
    </button>
</nav>

<div class="container py-4">

    <h1 class="h3 mb-4">Area professionista</h1>

    <div class="row g-3">

        <!-- Programmi creati -->
        <div class="col-md-6">
            <div class="card h-100">
                <div class="card-body">
                    <h2 class="h5">Programmi creati</h2>
                    <p class="text-muted mb-0" id="riepilogoProgrammi">In arrivo.</p>
                </div>
            </div>
        </div>

        <!-- Piani creati -->
        <div class="col-md-6">
            <div class="card h-100">
                <div class="card-body">
                    <h2 class="h5">Piani nutrizionali creati</h2>
                    <p class="text-muted mb-0" id="riepilogoPiani">In arrivo.</p>
                </div>
            </div>
        </div>

        <!-- Clienti seguiti -->
        <div class="col-md-6">
            <div class="card h-100">
                <div class="card-body">
                    <h2 class="h5">Clienti seguiti</h2>
                    <p class="text-muted mb-0" id="riepilogoClienti">In arrivo.</p>
                </div>
            </div>
        </div>

        <!-- Feedback ricevuti -->
        <div class="col-md-6">
            <div class="card h-100">
                <div class="card-body">
                    <h2 class="h5">Feedback ricevuti</h2>
                    <p class="text-muted mb-0" id="riepilogoFeedback">In arrivo.</p>
                </div>
            </div>
        </div>

    </div>
</div>

<script src="js/api.js"></script>
<script src="js/professionista.js"></script>

</body>
</html>

<!doctype html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Palestra digitale - Area cliente</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/stile.css">
</head>
<body class="bg-light">

<!-- Barra in alto: nome utente + logout -->
<nav class="navbar navbar-expand bg-white border-bottom px-4">
    <span class="navbar-brand">Palestra digitale</span>
    <span class="ms-auto me-3 text-muted">
        Ciao <span id="nomeUtente"></span>
    </span>
    <button id="btnLogout" type="button" class="btn btn-outline-secondary btn-sm">
        Esci
    </button>
</nav>

<div class="container py-4">

    <h1 class="h3 mb-4">Area cliente</h1>

    <div class="row g-3">

        <!-- Programma corrente -->
        <div class="col-md-6">
            <div class="card h-100">
                <div class="card-body">
                    <h2 class="h5">Il mio programma</h2>
                    <p class="text-muted mb-0" id="riepilogoProgramma">In arrivo.</p>
                </div>
            </div>
        </div>

        <!-- Piano nutrizionale -->
        <div class="col-md-6">
            <div class="card h-100">
                <div class="card-body">
                    <h2 class="h5">Piano nutrizionale</h2>
                    <p class="text-muted mb-0" id="riepilogoPiano">In arrivo.</p>
                </div>
            </div>
        </div>

        <!-- Storico sessioni -->
        <div class="col-md-6">
            <div class="card h-100">
                <div class="card-body">
                    <h2 class="h5">Le mie sessioni</h2>
                    <p class="text-muted mb-0" id="riepilogoSessioni">In arrivo.</p>
                </div>
            </div>
        </div>

        <!-- Catalogo programmi -->
        <div class="col-md-6">
            <div class="card h-100">
                <div class="card-body">
                    <h2 class="h5">Catalogo programmi</h2>
                    <p class="text-muted mb-0" id="riepilogoCatalogo">In arrivo.</p>
                </div>
            </div>
        </div>

    </div>
</div>

<script src="js/api.js"></script>
<script src="js/cliente.js"></script>

</body>
</html>

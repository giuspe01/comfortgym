<!doctype html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Comfortgym - I miei programmi</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/stile.css">
    <style>
        .card-img-programma {
            height: 180px;
            object-fit: cover;
        }
        .card-img-placeholder {
            height: 180px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 2.5rem;
        }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand bg-white border-bottom px-4">
    <span class="navbar-brand">Comfortgym</span>
    <div class="ms-auto d-flex align-items-center gap-3">
        <a href="professionista.html" class="btn btn-sm btn-outline-secondary">← Dashboard</a>
        <a id="linkPiani" href="catalogo-piani-pro.html" class="btn btn-sm btn-outline-primary d-none">I miei piani</a>
        <button id="btnLogout" type="button" class="btn btn-outline-secondary btn-sm">Esci</button>
    </div>
</nav>

<div class="container py-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 mb-0">I miei programmi</h1>
        <button id="btnNuovoProgramma" type="button" class="btn btn-primary">+ Nuovo programma</button>
    </div>

    <!-- Form crea/modifica (nascosto all'avvio) -->
    <div id="cardFormProgramma" class="card mb-4 d-none">
        <div class="card-body">
            <h2 class="h5 mb-3" id="titoloFormProgramma">Nuovo programma</h2>
            <form id="formProgramma">
                <input type="hidden" id="idProgramma" value="">
                <input type="hidden" id="immaginePrecedente" value="">

                <div class="row">
                    <div class="col-md-8 mb-3">
                        <label for="nomeProgramma" class="form-label">Nome</label>
                        <input type="text" id="nomeProgramma" class="form-control"
                               required minlength="2" maxlength="100">
                    </div>
                    <div class="col-md-4 mb-3">
                        <label for="durataProgramma" class="form-label">Durata (settimane)</label>
                        <input type="number" id="durataProgramma" class="form-control"
                               min="1" max="52" required>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-8 mb-3">
                        <label for="obiettivoProgramma" class="form-label">Obiettivo</label>
                        <input type="text" id="obiettivoProgramma" class="form-control"
                               required maxlength="199"
                               placeholder="Es. Perdita peso, Aumento massa muscolare...">
                    </div>
                    <div class="col-md-4 mb-3">
                        <label for="difficoltaProgramma" class="form-label">Difficolta'</label>
                        <select id="difficoltaProgramma" class="form-select" required>
                            <option value="principiante">Principiante</option>
                            <option value="intermedio">Intermedio</option>
                            <option value="avanzato">Avanzato</option>
                        </select>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="immagineProgramma" class="form-label">
                        Immagine <span class="text-muted small">(opzionale, max 5 MB)</span>
                    </label>
                    <input type="file" id="immagineProgramma" class="form-control" accept="image/*">
                    <div id="anteprimaImmagine" class="mt-2 d-none">
                        <small class="text-muted">Immagine attuale:</small>
                        <img id="imgAttuale" src="" alt="anteprima"
                             style="height: 60px; border-radius: 4px; margin-left: 8px;">
                    </div>
                </div>

                <h3 class="h6 mt-3">Esercizi</h3>
                <table class="table table-sm align-middle">
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th style="width: 80px">Serie</th>
                            <th style="width: 100px">Ripetizioni</th>
                            <th style="width: 100px">Riposo (s)</th>
                            <th>Note</th>
                            <th style="width: 60px"></th>
                        </tr>
                    </thead>
                    <tbody id="righeEsercizi"></tbody>
                </table>
                <button type="button" id="btnAggiungiEsercizio"
                        class="btn btn-sm btn-outline-primary mb-3">
                    + Aggiungi esercizio
                </button>

                <div id="messaggioFormProgramma" class="alert d-none"></div>

                <div class="mt-3">
                    <button type="submit" class="btn btn-primary">Salva</button>
                    <button type="button" id="btnAnnullaProgramma"
                            class="btn btn-outline-secondary">Annulla</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Griglia card -->
    <div id="griglia" class="row row-cols-1 row-cols-md-3 g-4">
        <div class="col"><p class="text-muted">Caricamento...</p></div>
    </div>

</div>

<!-- Modale dettaglio programma -->
<div class="modal fade" id="modalDettaglio" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitolo"></h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="modalCorpo"></div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">
                    Chiudi
                </button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/catalogo-programmi-pro.js"></script>

</body>
</html>
